<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casas do Forte — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e28;
    --surface3: #222736;
    --border: #2a2f3d;
    --accent: #c9a96e;
    --accent2: #7ec8a4;
    --accent3: #e87c6a;
    --accent4: #6a9ae8;
    --text: #e8e6e0;
    --text2: #9a9690;
    --text3: #5c5a56;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,169,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,169,110,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 40px 24px; }

  /* Header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .header-left {}
  .property-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  h1 em { color: var(--accent); font-style: italic; }
  .header-right { text-align: right; }
  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
  }
  .refresh-btn {
    margin-top: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    display: block;
    margin-left: auto;
  }
  .refresh-btn:hover { background: var(--surface3); border-color: var(--accent); }

  /* Loading / Error */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    gap: 16px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.15em; }

  .error-state {
    background: rgba(232,124,106,0.08);
    border: 1px solid rgba(232,124,106,0.3);
    border-radius: 8px;
    padding: 24px;
    margin: 40px 0;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent3);
    line-height: 1.6;
  }

  /* Year tabs */
  .year-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    width: fit-content;
  }
  .year-tab {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 8px 20px;
    border-radius: 5px;
    cursor: pointer;
    color: var(--text2);
    border: none;
    background: transparent;
    transition: all 0.2s;
  }
  .year-tab.active { background: var(--accent); color: var(--bg); font-weight: 500; }
  .year-tab:not(.active):hover { color: var(--text); background: var(--surface2); }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .kpi-card:hover { border-color: var(--accent); }
  .kpi-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi-card.gold::after { background: var(--accent); }
  .kpi-card.green::after { background: var(--accent2); }
  .kpi-card.red::after { background: var(--accent3); }
  .kpi-card.blue::after { background: var(--accent4); }
  .kpi-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .kpi-value {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }
  .kpi-value.gold { color: var(--accent); }
  .kpi-value.green { color: var(--accent2); }
  .kpi-sub {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  /* Section titles */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 0.2em;
  }

  /* Charts grid */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }
  .chart-card.wide { grid-column: 1 / -1; }
  .chart-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .chart-wrap { position: relative; height: 220px; }

  /* Reservations table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .table-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .table-header-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text2);
    text-transform: uppercase;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
    text-align: left;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td {
    padding: 14px 24px;
    font-size: 13px;
    color: var(--text2);
    vertical-align: middle;
  }
  tbody td.primary { color: var(--text); font-weight: 500; }
  tbody td.amount { color: var(--accent); font-family: 'DM Mono', monospace; font-size: 13px; }
  tbody td.amount.error { color: var(--accent3); }
  tbody td.amount.ok { color: var(--accent2); }

  /* Status badge */
  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
  }
  .badge.ativa { background: rgba(126,200,164,0.15); color: var(--accent2); border: 1px solid rgba(126,200,164,0.3); }
  .badge.concluida { background: rgba(201,169,110,0.12); color: var(--accent); border: 1px solid rgba(201,169,110,0.25); }
  .badge.paga { background: rgba(106,154,232,0.12); color: var(--accent4); border: 1px solid rgba(106,154,232,0.25); }
  .badge.cancelada { background: rgba(232,124,106,0.12); color: var(--accent3); border: 1px solid rgba(232,124,106,0.25); }

  /* Math verification */
  .math-icon { font-size: 12px; margin-right: 4px; }
  .math-ok { color: var(--accent2); }
  .math-warn { color: var(--accent3); }
  .math-na { color: var(--text3); }

  /* Nationality breakdown */
  .nat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 32px;
  }
  .nat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .nat-name { font-size: 13px; color: var(--text2); }
  .nat-count { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); }

  /* Expenses */
  .expenses-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 32px;
  }

  /* Personal blocks */
  .personal-blocks { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px; }
  .personal-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent4);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 12px;
  }
  .personal-block-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 0.15em; margin-bottom: 4px; }
  .personal-block-dates { color: var(--text2); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 480px;
    overflow: hidden;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .modal-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
  }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-left: 12px;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--surface3); color: var(--text); }
  .modal-body { padding: 20px 24px; }
  .modal-info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .modal-info-label { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; }
  .modal-info-val { color: var(--text2); }
  .modal-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .modal-breakdown-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .modal-line {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 8px;
    align-items: center;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .modal-line-season { color: var(--text); font-weight: 500; }
  .modal-line-nights { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 10px; }
  .modal-line-rate { color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; }
  .modal-line-sub { color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; text-align: right; }
  .modal-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 12px 0;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .modal-total-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.1em; }
  .modal-total-val { font-family: 'DM Serif Display', serif; font-size: 22px; }
  .modal-total-val.ok { color: var(--accent2); }
  .modal-total-val.warn { color: var(--accent3); }
  .modal-verdict {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    line-height: 1.5;
  }
  .modal-verdict.ok { background: rgba(126,200,164,0.1); border: 1px solid rgba(126,200,164,0.25); color: var(--accent2); }
  .modal-verdict.warn { background: rgba(232,124,106,0.1); border: 1px solid rgba(232,124,106,0.25); color: var(--accent3); }
  .modal-verdict.na { background: rgba(92,90,86,0.1); border: 1px solid var(--border); color: var(--text3); }
  .math-clickable { cursor: pointer; text-decoration: underline dotted; text-underline-offset: 3px; }
  .math-clickable:hover { opacity: 0.8; }

  /* Footer */
  footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <div class="property-label">Proprietário · FORTE-3-1.FG</div>
      <h1>Casas do <em>Forte</em></h1>
    </div>
    <div class="header-right">
      <div class="last-updated" id="lastUpdated">Fetching data...</div>
      <button class="refresh-btn" onclick="loadAllData()">↻ REFRESH</button>
    </div>
  </header>

  <!-- Math Popup Modal -->
  <div class="modal-overlay" id="mathModal" onclick="closeMathModal(event)">
    <div class="modal" id="mathModalInner">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle">Calculation Breakdown</div>
          <div class="modal-subtitle" id="modalSubtitle"></div>
        </div>
        <button class="modal-close" onclick="closeMathModalDirect()">&#x2715;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div id="mainContent">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">LOADING LIVE DATA</div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1VGgTp5HrfsQBNPbsSuWvYRKdT3sEV5AIV_vAru5x6GM';
const API_KEY = 'AIzaSyDB2QYjyVI4ULHJcdZ4_phVYZh2xLETnAw';

// Rate table from OBSERVACOES sheet
// Época Baixa spans Nov 1 – Mar 31 (wraps across year boundary)
const RATE_TABLE = [
  { season: 'ÉPOCA BAIXA',   months: [11,12,1,2,3], end_day: { 3: 31 }, curta:62,  media:55, standard:50, larga:46 },
  { season: 'ABRIL',         months: [4],  curta:80,  media:70, standard:64, larga:59 },
  { season: 'MAIO',          months: [5],  curta:83,  media:73, standard:67, larga:61 },
  { season: 'JUNHO (01)',    months: [6],  endDay:14, curta:123, media:109,standard:99, larga:91 },
  { season: 'JUNHO (02)',    months: [6],  startDay:15, curta:139, media:122,standard:111,larga:102 },
  { season: 'JULHO (01)',    months: [7],  endDay:14, curta:163, media:143,standard:130,larga:120 },
  { season: 'JULHO (02)',    months: [7],  startDay:15, curta:210, media:185,standard:168,larga:155 },
  { season: 'AGOSTO',        months: [8],  curta:217, media:191,standard:174,larga:160 },
  { season: 'SETEMBRO (01)', months: [9],  endDay:14, curta:170, media:149,standard:136,larga:125 },
  { season: 'SETEMBRO (02)', months: [9],  startDay:15, curta:138, media:122,standard:111,larga:102 },
  { season: 'OUTUBRO',       months: [10], curta:95,  media:84, standard:76, larga:70 },
];

function getRateForDate(date) {
  const m = date.getMonth() + 1; // 1-12
  const d = date.getDate();

  for (const r of RATE_TABLE) {
    if (!r.months.includes(m)) continue;
    // Check startDay / endDay constraints for split months
    if (r.startDay && d < r.startDay) continue;
    if (r.endDay && d > r.endDay) continue;
    return r;
  }
  return null; // should never happen with full table
}

function getDailyRate(rate, nights) {
  if (!rate) return null;
  // 3-4 nights = CURTA (+25%), 5-6 = MÉDIA (+10%), 7-13 = STANDARD, 14+ = LARGA (-8%)
  if (nights >= 14) return rate.larga;
  if (nights >= 7)  return rate.standard;
  if (nights >= 5)  return rate.media;
  if (nights >= 3)  return rate.curta;
  return null; // under minimum (1-2 nights)
}

function parseEuro(str) {
  if (!str) return 0;
  return parseFloat(String(str).replace(/[€\s\.]/g,'').replace(',','.')) || 0;
}

function parseDate(str) {
  if (!str) return null;
  const parts = String(str).split('/');
  if (parts.length === 3) {
    return new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  }
  return null;
}

async function fetchSheet(sheetName, range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!${range}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheet fetch failed: ${res.status} ${res.statusText}`);
  const data = await res.json();
  return data.values || [];
}

function parseReservations(rows) {
  const reservations = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row[2] || !row[4]) continue; // need at least reserva and entrada
    const nights = parseInt(row[6]) || 0;
    if (nights === 0) continue;
    reservations.push({
      complexo: row[0] || '',
      ref: row[1] || '',
      reserva: row[2] || '',
      nacionalidade: row[3] || '',
      entrada: parseDate(row[4]),
      saida: parseDate(row[5]),
      noites: nights,
      proprietario: parseEuro(row[7]),
      estado: (row[8] || '').toLowerCase(),
      aviso: row[9] || '',
      rawEntrada: row[4],
      rawSaida: row[5],
      rawProprietario: row[7],
    });
  }
  return reservations;
}

function getBracketName(nights) {
  if (nights >= 14) return 'Larga';
  if (nights >= 7)  return 'Standard';
  if (nights >= 5)  return 'Média';
  if (nights >= 3)  return 'Curta';
  return null;
}

function verifyMath(r) {
  if (!r.entrada || !r.noites) return { status: 'na', msg: 'N/A', lines: [] };
  if (r.noites < 3) return { status: 'na', msg: '< 3 nights', lines: [] };

  const bracket = getBracketName(r.noites);
  let expected = 0;
  let breakdown = {};
  const current = new Date(r.entrada.getTime());

  for (let i = 0; i < r.noites; i++) {
    const rate = getRateForDate(current);
    if (!rate) { current.setDate(current.getDate() + 1); continue; }

    let nightRate;
    if (r.noites >= 14)     nightRate = rate.larga;
    else if (r.noites >= 7) nightRate = rate.standard;
    else if (r.noites >= 5) nightRate = rate.media;
    else                    nightRate = rate.curta;

    expected += nightRate;

    const key = rate.season;
    if (!breakdown[key]) breakdown[key] = { nights: 0, rate: nightRate, subtotal: 0 };
    breakdown[key].nights++;
    breakdown[key].subtotal += nightRate;

    current.setDate(current.getDate() + 1);
  }

  expected = Math.round(expected);
  const actual = r.proprietario;
  const diff = actual - expected;

  const lines = Object.entries(breakdown).map(([season, d]) => ({
    season, nights: d.nights, rate: d.rate, subtotal: Math.round(d.subtotal),
  }));

  const shortMsg = Math.abs(diff) <= 2
    ? `✓ ${expected}€`
    : `⚠ ~${expected}€ (diff: ${diff > 0 ? '+':''}${diff}€)`;

  return { status: Math.abs(diff) <= 2 ? 'ok' : 'warn', msg: shortMsg, bracket, expected, actual, diff, lines };
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let charts = {};
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function renderDashboard(res2026, res2025, expenses, currentYear) {
  const allRes = currentYear === '2026' ? res2026 : res2025;

  // KPIs
  const totalIncome = allRes.reduce((s,r) => s + r.proprietario, 0);
  const totalNights = allRes.reduce((s,r) => s + r.noites, 0);
  const totalReservations = allRes.length;
  const avgPerStay = totalReservations > 0 ? Math.round(totalIncome / totalReservations) : 0;
  const paidCount = allRes.filter(r => r.estado === 'paga' || r.estado === 'concluída' || r.estado === 'concluida').length;
  const totalExpenses = expenses.reduce((s,e) => s + e.valor, 0);

  // Monthly breakdown
  const monthlyData = {};
  for (let m = 0; m < 12; m++) monthlyData[m] = { income: 0, nights: 0, count: 0 };
  for (const r of allRes) {
    if (r.entrada) {
      const m = r.entrada.getMonth();
      monthlyData[m].income += r.proprietario;
      monthlyData[m].nights += r.noites;
      monthlyData[m].count++;
    }
  }

  // Nationality breakdown
  const natCount = {};
  for (const r of allRes) {
    const n = r.nacionalidade || 'Unknown';
    natCount[n] = (natCount[n] || 0) + 1;
  }
  const sortedNat = Object.entries(natCount).sort((a,b) => b[1]-a[1]);

  // Math verification summary
  const mathResults = allRes.map(r => ({ ...r, math: verifyMath(r) }));
  const mathOk = mathResults.filter(r => r.math.status === 'ok').length;
  const mathWarn = mathResults.filter(r => r.math.status === 'warn').length;
  const mathNa = mathResults.filter(r => r.math.status === 'na').length;

  const html = `
    <div class="year-tabs">
      <button class="year-tab ${currentYear==='2026'?'active':''}" onclick="switchYear('2026')">2026</button>
      <button class="year-tab ${currentYear==='2025'?'active':''}" onclick="switchYear('2025')">2025</button>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card gold">
        <div class="kpi-label">Total Income ${currentYear}</div>
        <div class="kpi-value gold">${totalIncome.toLocaleString('pt-PT')}€</div>
        <div class="kpi-sub">${totalReservations} reservations</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Total Nights Booked</div>
        <div class="kpi-value green">${totalNights}</div>
        <div class="kpi-sub">avg ${totalReservations > 0 ? Math.round(totalNights/totalReservations) : 0} nights/stay</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Avg Revenue / Stay</div>
        <div class="kpi-value">${avgPerStay}€</div>
        <div class="kpi-sub">${paidCount} paid / settled</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">Pending Expenses</div>
        <div class="kpi-value">${totalExpenses.toFixed(2).replace('.',',')}€</div>
        <div class="kpi-sub">${expenses.length} item${expenses.length !== 1 ? 's':''} logged</div>
      </div>
      <div class="kpi-card ${mathWarn > 0 ? 'red':'green'}">
        <div class="kpi-label">Payment Verification</div>
        <div class="kpi-value ${mathWarn > 0 ? '':'green'}">${mathWarn > 0 ? mathWarn+' ⚠' : '✓ OK'}</div>
        <div class="kpi-sub">${mathOk} verified · ${mathWarn} discrepancy · ${mathNa} N/A</div>
      </div>
    </div>

    <!-- Charts -->
    <div style="margin-bottom:8px">
      <div class="section-label">ANALYTICS</div>
    </div>
    <div class="charts-grid">
      <div class="chart-card wide">
        <div class="chart-title">Monthly Income (€) — ${currentYear}</div>
        <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Nights per Month</div>
        <div class="chart-wrap"><canvas id="nightsChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Guests by Nationality</div>
        <div class="chart-wrap"><canvas id="natChart"></canvas></div>
      </div>
    </div>

    <!-- Nationality breakdown -->
    <div style="margin-bottom:16px"><div class="section-label">GUEST ORIGINS</div></div>
    <div class="nat-grid">
      ${sortedNat.map(([nat, count]) => `
        <div class="nat-card">
          <span class="nat-name">${nat}</span>
          <span class="nat-count">${count}</span>
        </div>
      `).join('')}
    </div>

    <!-- Personal use blocks -->
    ${currentYear === '2026' ? `
    <div style="margin-bottom:16px"><div class="section-label">PERSONAL USE PERIODS</div></div>
    <div class="personal-blocks">
      <div class="personal-block">
        <div class="personal-block-label">Block 1</div>
        <div class="personal-block-dates">23 May → 30 May 2026</div>
      </div>
      <div class="personal-block">
        <div class="personal-block-label">Block 2</div>
        <div class="personal-block-dates">31 Jul → 21 Aug 2026</div>
      </div>
    </div>` : ''}

    <!-- Reservations table -->
    <div style="margin-bottom:16px"><div class="section-label">ALL RESERVATIONS — ${currentYear}</div></div>
    <div class="table-card">
      <div class="table-header">
        <span class="table-header-title">Reservation Log · ${allRes.length} entries</span>
        <span class="table-header-title" style="color:var(--accent)">FORTE-3-1.FG</span>
      </div>
      <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Reservation #</th>
            <th>Nationality</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Nights</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Math Check</th>
          </tr>
        </thead>
        <tbody>
          ${mathResults.map(r => {
            const mathClass = r.math.status === 'ok' ? 'math-ok' : r.math.status === 'warn' ? 'math-warn' : 'math-na';
            const amtClass = r.math.status === 'warn' ? 'error' : r.math.status === 'ok' ? 'ok' : '';
            return `<tr>
              <td class="primary">${r.reserva}</td>
              <td>${r.nacionalidade}</td>
              <td>${r.rawEntrada || '—'}</td>
              <td>${r.rawSaida || '—'}</td>
              <td style="text-align:center">${r.noites}</td>
              <td class="amount ${amtClass}">${r.proprietario.toLocaleString('pt-PT')}€</td>
              <td><span class="badge ${r.estado}">${r.estado || '—'}</span></td>
              <td class="${mathClass} math-clickable" style="font-size:11px;font-family:'DM Mono',monospace" onclick="showMathModal(${JSON.stringify(JSON.stringify(r.math))}, '${r.reserva}', '${r.rawEntrada}', '${r.rawSaida}', ${r.noites}, ${r.proprietario})">${r.math.msg}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
    </div>

    <!-- Expenses -->
    <div style="margin-bottom:16px"><div class="section-label">EXPENSES (DESPESAS)</div></div>
    <div class="table-card">
      <div class="table-header">
        <span class="table-header-title">Expense Log · ${expenses.length} item${expenses.length!==1?'s':''}</span>
        <span class="table-header-title" style="color:var(--accent3)">Total: ${totalExpenses.toFixed(2).replace('.',',')}€</span>
      </div>
      ${expenses.length === 0 ? '<div style="padding:24px;color:var(--text3);font-family:DM Mono,monospace;font-size:11px">No expenses logged.</div>' : `
      <table>
        <thead><tr><th>Property</th><th>Ref</th><th>Description</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>
          ${expenses.map(e => `<tr>
            <td>${e.complexo}</td>
            <td>${e.ref}</td>
            <td class="primary">${e.descricao}</td>
            <td class="amount">${e.valor.toFixed(2).replace('.',',')}€</td>
            <td><span class="badge ${e.estado.toLowerCase()}">${e.estado}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  `;

  document.getElementById('mainContent').innerHTML = html;

  // Chart defaults
  Chart.defaults.color = '#5c5a56';
  Chart.defaults.borderColor = '#2a2f3d';
  Chart.defaults.font.family = "'DM Mono', monospace";
  Chart.defaults.font.size = 10;

  const monthLabels = MONTHS;
  const incomeData = monthLabels.map((_, i) => monthlyData[i].income);
  const nightsData = monthLabels.map((_, i) => monthlyData[i].nights);

  destroyChart('monthly'); destroyChart('nights'); destroyChart('nat');

  // Monthly income bar
  charts['monthly'] = new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels: monthLabels,
      datasets: [{
        data: incomeData,
        backgroundColor: incomeData.map(v => v > 0 ? 'rgba(201,169,110,0.7)' : 'rgba(201,169,110,0.1)'),
        borderColor: 'rgba(201,169,110,0.9)',
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.raw.toLocaleString('pt-PT')}€` }
      }},
      scales: {
        x: { grid: { color: 'rgba(42,47,61,0.5)' } },
        y: { grid: { color: 'rgba(42,47,61,0.5)' }, ticks: { callback: v => v+'€' } }
      }
    }
  });

  // Nights line
  charts['nights'] = new Chart(document.getElementById('nightsChart'), {
    type: 'line',
    data: {
      labels: monthLabels,
      datasets: [{
        data: nightsData,
        borderColor: '#7ec8a4',
        backgroundColor: 'rgba(126,200,164,0.08)',
        pointBackgroundColor: '#7ec8a4',
        pointRadius: 4,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(42,47,61,0.5)' } },
        y: { grid: { color: 'rgba(42,47,61,0.5)' }, ticks: { stepSize: 1 } }
      }
    }
  });

  // Nationality doughnut
  const natColors = ['#c9a96e','#7ec8a4','#6a9ae8','#e87c6a','#b07cc9','#e8c56a','#6ae8c5','#e86ac9'];
  charts['nat'] = new Chart(document.getElementById('natChart'), {
    type: 'doughnut',
    data: {
      labels: sortedNat.map(([n]) => n),
      datasets: [{
        data: sortedNat.map(([,c]) => c),
        backgroundColor: natColors.slice(0, sortedNat.length),
        borderColor: '#13161e',
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { boxWidth: 10, padding: 12, font: { size: 10 } } }
      },
      cutout: '65%',
    }
  });
}

let data2026 = [], data2025 = [], dataExpenses = [];
let activeYear = '2026';

window.switchYear = function(year) {
  activeYear = year;
  renderDashboard(data2026, data2025, dataExpenses, year);
};

async function loadAllData() {
  document.getElementById('mainContent').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">FETCHING LIVE DATA FROM GOOGLE SHEETS</div>
    </div>`;
  document.getElementById('lastUpdated').textContent = 'Loading...';

  try {
    const [rows2026, rows2025, rowsExpenses] = await Promise.all([
      fetchSheet('PROPRIETARIO - 2026', 'A1:J100'),
      fetchSheet('PROPRIETARIO - 2025', 'A1:J100'),
      fetchSheet('DESPESAS', 'A1:E100'),
    ]);

    data2026 = parseReservations(rows2026);
    data2025 = parseReservations(rows2025);

    // Parse expenses
    dataExpenses = [];
    for (let i = 1; i < rowsExpenses.length; i++) {
      const row = rowsExpenses[i];
      if (!row || !row[2]) continue;
      dataExpenses.push({
        complexo: row[0] || '',
        ref: row[1] || '',
        descricao: row[2] || '',
        valor: parseEuro(row[3]),
        estado: row[4] || '',
      });
    }

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      `UPDATED ${now.toLocaleDateString('pt-PT')} ${now.toLocaleTimeString('pt-PT', {hour:'2-digit',minute:'2-digit'})}`;

    renderDashboard(data2026, data2025, dataExpenses, activeYear);

  } catch (err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="error-state">
        <strong>⚠ Failed to fetch data</strong><br><br>
        ${err.message}<br><br>
        Make sure your Google Sheet is shared as "Anyone with the link can view" and the Sheets API is enabled for your API key.
      </div>`;
    document.getElementById('lastUpdated').textContent = 'Error loading data';
  }
}

loadAllData();

// ── Modal ────────────────────────────────────────────────
window.showMathModal = function(mathJsonStr, reserva, entrada, saida, noites, actual) {
  const math = JSON.parse(mathJsonStr);
  document.getElementById('modalTitle').textContent = 'Calculation · ' + reserva;
  document.getElementById('modalSubtitle').textContent = entrada + '  →  ' + saida + '  ·  ' + noites + ' nights';

  let body = '';

  // Info rows
  body += '<div class="modal-info-row"><span class="modal-info-label">STAY TYPE (BRACKET)</span><span class="modal-info-val">' + (math.bracket || 'N/A') + '</span></div>';
  body += '<div class="modal-info-row"><span class="modal-info-label">TOTAL NIGHTS</span><span class="modal-info-val">' + noites + '</span></div>';
  body += '<div class="modal-info-row"><span class="modal-info-label">AMOUNT RECEIVED</span><span class="modal-info-val" style="color:var(--accent)">' + actual.toLocaleString('pt-PT') + '€</span></div>';

  if (math.lines && math.lines.length > 0) {
    body += '<hr class="modal-divider">';
    body += '<div class="modal-breakdown-title">Night-by-Night Breakdown</div>';

    let calcStr = '';
    math.lines.forEach(function(line, i) {
      body += '<div class="modal-line">';
      body += '<span class="modal-line-season">' + line.season + '</span>';
      body += '<span class="modal-line-nights">' + line.nights + 'n</span>';
      body += '<span class="modal-line-rate">× ' + line.rate + '€</span>';
      body += '<span class="modal-line-sub">= ' + line.subtotal + '€</span>';
      body += '</div>';
      calcStr += (i > 0 ? ' + ' : '') + line.subtotal + '€';
    });

    body += '<div class="modal-total-row">';
    body += '<span class="modal-total-label">EXPECTED TOTAL<br><span style="font-size:9px;opacity:0.6">' + calcStr + '</span></span>';
    body += '<span class="modal-total-val ' + math.status + '">' + math.expected + '€</span>';
    body += '</div>';

    body += '<div class="modal-verdict ' + math.status + '">';
    if (math.status === 'ok') {
      body += '✓ Amount received matches the expected calculation.';
    } else if (math.status === 'warn') {
      const diff = math.diff;
      body += '⚠ Discrepancy of ' + (diff > 0 ? '+' : '') + diff + '€ — received ' + actual + '€ vs expected ' + math.expected + '€.';
    }
    body += '</div>';
  } else {
    body += '<div class="modal-verdict na">Not enough data to verify this reservation.</div>';
  }

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('mathModal').classList.add('open');
};

window.closeMathModal = function(e) {
  if (e.target === document.getElementById('mathModal')) {
    document.getElementById('mathModal').classList.remove('open');
  }
};

window.closeMathModalDirect = function() {
  document.getElementById('mathModal').classList.remove('open');
};

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('mathModal').classList.remove('open');
});
